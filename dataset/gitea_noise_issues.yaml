- title: "Restrict shortened links to certain domains for certain users"
  body: |
    Hello,

    (Question/Feature request)

    Is it currently possible to restrict the links that are shortened from a specific domain?

    My use case is that I want to deploy a URL shortener service for a specific domain where the visitors can create their own shortened urls. This is a static website, so the API call to the kutt service will use a publicly visible API key. The URL's to shorten would include SPARQL code, which is something similar to SQL.
  source: "https://github.com/thedevs-network/kutt/issues/954"

