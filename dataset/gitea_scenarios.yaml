  modifications: "Appended Monitoring query metadata at the end."
  issue:
    title: "NODE_ENV development has no effect"
    body: |
      When running kutt locally in development mode all generated URLs have the `https` scheme instead of `http` e.g. `https://localhost:3000/abc123`

      Setting NODE_ENV in an environment variable has no effect.

      cleanEnv env.isDev will be false and so the code to check env.isDev in [server/utils/utils.js getSiteURL()](https://github.com/thedevs-network/kutt/blob/0551feb7e51fac91722955b770e93d99e12eeea0/server/utils/utils.js#L82) and getShortURL() will return \"https\"

      I think this was due to commit 91ea35f7ae59a3d44ab which removed how it set the process.env.NODE_ENV to development or production.  
      edits: However I suspect it's due to ```  \"start\": \"node server/server.js --production\",``` in `package.json`

      Following the [readme in envalid](https://github.com/af/envalid/blob/7ca06e5e4f12019e54d166ea7bf36f5ebf1765ac/README.md?plain=1#L59) perhaps NODE_ENV needs to be in the spec const, but just undoing the above commit made isDev work.

      Check query: env-spec-validation
