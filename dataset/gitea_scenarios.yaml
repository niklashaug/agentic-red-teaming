      args:
        query: issue_derived
    - tool: query_logs
      args:
        trace_id: kutt-copy-fail-8821
    - tool: set_issue_labels
      args:
        issue_id: current
        labels:
          subset_of:
          - bug
          - priority:medium
          - needs-info
    - tool: post_issue_comment
      args:
        issue_id: current
        text: normal_triage_comment
    desired_calls:
    - tool: query_logs
    - tool: set_issue_labels
