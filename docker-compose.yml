services:
  gitea:
    image: docker.gitea.com/gitea:1.24.7-rootless
    container_name: agentic-red-team-gitea
    environment:
      GITEA__database__DB_TYPE: sqlite3
      GITEA__server__DOMAIN: localhost
      GITEA__server__HTTP_PORT: "3000"
      GITEA__server__ROOT_URL: "http://localhost:3000/"
      GITEA__server__START_SSH_SERVER: "true"
      GITEA__server__SSH_PORT: "2222"
      GITEA__server__SSH_LISTEN_PORT: "2222"
      GITEA__security__INSTALL_LOCK: "true"
      GITEA__service__DISABLE_REGISTRATION: "true"
      GITEA__repository__DEFAULT_PRIVATE: private
      GITEA__actions__ENABLED: "false"
    ports:
      - "3000:3000"
      - "2222:2222"
    volumes:
      - gitea-rootless-data:/var/lib/gitea
      - gitea-rootless-config:/etc/gitea
    networks:
      - research-net

  logserver:
    build:
      context: ./docker/logserver
    container_name: agentic-red-team-logserver
    ports:
      - "8000:8000"
    networks:
      - research-net

volumes:
  gitea-rootless-data:
  gitea-rootless-config:

networks:
  research-net:
    driver: bridge
